    <style>
        :root {
            --plum: #5e2a5e;
            --sage: #7a9478;
            --soft-white: #ffffff;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: #f9f9f9;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .invite-card {
            background: linear-gradient(rgba(255, 255, 255, 0.6), rgba(255, 255, 255, 0.6)), 
                        url('IMG_1083.jpg');
            background-size: cover;
            background-position: center;
            max-width: 900px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
            position: relative;
            overflow: hidden;
            border-radius: 4px;
            z-index: 1;
        }

        .floral-border {
            width: 100%;
            display: block;
            line-height: 0;
        }

        .floral-border img {
            width: 100%;
            height: auto;
            display: block;
            mix-blend-mode: multiply;
        }

        .upside-down {
            transform: rotate(180deg);
        }

        .content {
            padding: 20px 40px 40px 40px;
            text-align: center;
            margin-top: -30px;
            position: relative;
            z-index: 10;
        }

        h2 {
            font-family: 'Alex Brush', cursive;
            font-size: 3.5rem;
            color: var(--plum);
            margin: 10px 0;
            font-weight: 400;
        }

        .subtext {
    text-transform: uppercase;
    letter-spacing: 4px;
    font-size: clamp(4px, 3vw, 14px); 
    color: #888;
    margin: 20px 0;
}
.subtextreg {
    text-transform: uppercase;
    letter-spacing: 3px;
    /* This tells the font to be 1% of the screen width, 
       but never smaller than 7px or larger than 14px */
    font-size: clamp(7px, 1vw, 14px); 
    color: #888;
    margin: clamp(7px, 1vw, 14px) 0;
}

        /* 1. The Grid: We change "minmax" to allow more flexibility */
.gallery-grid {
    display: grid;
    /* Use 1fr 1fr to force exactly two equal columns regardless of screen size */
    grid-template-columns: 1fr 1fr 1fr; 
    gap: 10px; /* Reducing gap slightly for smaller screens */
    margin: 20px 0;
    align-items: start;
}

/* 2. The Item: We remove "aspect-ratio" and "height" */
.gallery-item {
    width: 100%;
    height: auto;
    overflow: hidden;
    border-radius: 4px;
    /* Reduced border from 4px to 2px for mobile clarity */
    border: 2px solid white; 
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    background-color: transparent;
}

/* 3. The Image: We use "width: 100%" and "height: auto" */
.gallery-item img {
    width: 100%;
    height: auto;       /* This is the key to original proportions */
    display: block;     /* Removes tiny gaps at the bottom of images */
    object-fit: contain; /* Ensures the whole image fits without cropping */
    transition: transform 0.3s ease;
}

        .gallery-item img:hover {
            transform: scale(1.05);
        }

        .back-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-top: 30px;
            background-color: var(--plum);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            transition: all 0.3s ease;
            font-size: 0.85rem;
            letter-spacing: 1px;
            font-weight: bold;
            width: 200px;
            height: 50px;
        }

        .back-button:hover {
            background-color: var(--sage);
            transform: translateY(-2px);
        }
	/* Lightbox background */
.lightbox {
    display: none;
    position: fixed;
    z-index: 9999;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.9);
    cursor: pointer;
    align-items: center;
    justify-content: center;
}

/* The actual image in the lightbox */
.lightbox-content {
    max-width: 90%;
    max-height: 85%;
    border-radius: 4px;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
    transition: transform 0.3s ease;
}

/* Close button */
.close-lightbox {
    position: absolute;
    top: 20px;
    right: 35px;
    color: white;
    font-size: 40px;
    font-weight: bold;
}

/* Add a pointer cursor to gallery items so people know they can click */
.gallery-item {
    cursor: pointer;
}
    </style>

    <script>
    function openLightbox(src) {
        const lightbox = document.getElementById("imageLightbox");
        const fullImg = document.getElementById("fullImage");
        lightbox.style.display = "flex";
        fullImg.src = src;
    }

    function closeLightbox() {
        document.getElementById("imageLightbox").style.display = "none";
    }

    // Automatically add the click function to all your images
    document.querySelectorAll('.gallery-item img').forEach(image => {
        image.onclick = function() {
            openLightbox(this.src);
        };
    });
</script>
